<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Setup - SafeCircle</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "surface-container": "#ffe9e4",
                    "outline-variant": "#e2bfb5",
                    "on-tertiary-fixed-variant": "#004c6d",
                    "inverse-surface": "#3d2d28",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#872100",
                    "on-surface": "#261814",
                    "background": "#fff8f6",
                    "surface-container-highest": "#f7ddd6",
                    "on-tertiary-fixed": "#001e2e",
                    "on-surface-variant": "#5a413a",
                    "secondary-fixed": "#ffdbd1",
                    "surface-variant": "#f7ddd6",
                    "tertiary-container": "#007caf",
                    "secondary-container": "#ff9c80",
                    "on-background": "#261814",
                    "outline": "#8e7068",
                    "on-secondary-fixed-variant": "#77311c",
                    "on-tertiary": "#ffffff",
                    "surface": "#fff8f6",
                    "inverse-on-surface": "#ffede8",
                    "primary-container": "#cf4519",
                    "on-primary-fixed": "#3b0900",
                    "surface-tint": "#b02f00",
                    "tertiary": "#00628c",
                    "primary-fixed-dim": "#ffb5a0",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "primary": "#ac2d00",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#fff1ed",
                    "tertiary-fixed-dim": "#86ceff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#c8e6ff",
                    "secondary": "#954831",
                    "secondary-fixed-dim": "#ffb5a0",
                    "surface-dim": "#efd4ce",
                    "surface-bright": "#fff8f6",
                    "inverse-primary": "#ffb5a0",
                    "on-secondary-container": "#78321d",
                    "on-tertiary-container": "#fcfcff",
                    "error": "#ba1a1a",
                    "primary-fixed": "#ffdbd1",
                    "on-primary-container": "#fffbff",
                    "surface-container-high": "#fde2dc",
                    "on-secondary-fixed": "#3b0900"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "16px",
                    "3xl": "40px",
                    "sm": "8px",
                    "xs": "4px",
                    "2xl": "32px",
                    "xl": "24px",
                    "4xl": "48px",
                    "md": "12px"
            },
            "fontFamily": {
                    "h1": ["Hanken Grotesk"],
                    "display": ["Hanken Grotesk"],
                    "body-sm": ["Hanken Grotesk"],
                    "body": ["Hanken Grotesk"],
                    "mono": ["JetBrains Mono"],
                    "label": ["Hanken Grotesk"],
                    "h2": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "h1": ["22px", {"lineHeight": "28.6px", "fontWeight": "600"}],
                    "display": ["28px", {"lineHeight": "33.6px", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "21px", "fontWeight": "400"}],
                    "body": ["16px", {"lineHeight": "25.6px", "fontWeight": "400"}],
                    "mono": ["13px", {"lineHeight": "18.2px", "fontWeight": "400"}],
                    "label": ["12px", {"lineHeight": "14.4px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                    "h2": ["18px", {"lineHeight": "25.2px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAFAF7; /* From Style Guidance Lev 0 */
            color: #261814;
        }
        .pulsing-ring {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(172, 45, 0, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(172, 45, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(172, 45, 0, 0); }
        }
        .custom-input:focus {
            box-shadow: inset 0 0 0 1px #ac2d00;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-body antialiased flex flex-col min-h-screen">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-lg h-[48px] bg-surface border-b border-outline-variant">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<span class="font-h1 text-h1 text-primary tracking-tight">SafeCircle</span>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[48px] pb-2xl px-lg flex flex-col max-w-[420px] mx-auto w-full">
<!-- Progress Indicator -->
<div class="mt-xl flex flex-col gap-xs">
<div class="flex justify-between items-end">
<span class="font-label text-label text-on-surface-variant uppercase tracking-widest">Step 3 of 5</span>
<span class="font-label text-label text-primary font-bold">60%</span>
</div>
<div class="w-full bg-surface-container-highest h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full w-3/5 rounded-full"></div>
</div>
</div>
<!-- Header Section -->
<section class="mt-3xl space-y-sm">
<h1 class="font-display text-display text-on-surface">Complete your profile</h1>
<p class="font-body text-on-surface-variant">Tell us a little about yourself.</p>
</section>
<!-- Profile Photo Setup -->
<section class="mt-2xl flex flex-col items-center">
<div class="relative group cursor-pointer active:scale-95 transition-transform">
<!-- Circular Placeholder -->
<div class="w-20 h-20 rounded-full bg-surface-container-high border-2 border-dashed border-outline flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-outline text-4xl">person</span>
</div>
<!-- Camera Overlay -->
<div class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-primary flex items-center justify-center border-2 border-surface shadow-sm">
<span class="material-symbols-outlined text-white text-body-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
</div>
<button class="mt-md font-label text-label text-primary font-bold uppercase tracking-tight hover:opacity-70 transition-opacity">
                Add Photo
            </button>
</section>
<!-- Form Section -->
<section class="mt-2xl flex-grow space-y-xl">
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant ml-xs" for="full_name">Full Name</label>
<input class="w-full h-[56px] px-lg rounded-lg border border-outline-variant bg-white custom-input text-body focus:outline-none focus:border-primary transition-all placeholder:text-on-surface-variant/40" id="full_name" placeholder="e.g. Sarah Mitchell" type="text"/>
</div>
<!-- Contextual Note (Optional but improves UX for Safety app) -->
<div class="p-md rounded-xl bg-surface-container-low border border-outline-variant flex gap-md items-start">
<span class="material-symbols-outlined text-primary text-body">verified_user</span>
<p class="font-body-sm text-on-surface-variant leading-snug">
                    Your name will be visible to your emergency contacts when you trigger an alert.
                </p>
</div>
</section>
<!-- Action Section -->
<footer class="mt-3xl space-y-md">
<button class="w-full h-12 bg-primary text-white font-h2 rounded-lg flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-40 disabled:grayscale disabled:cursor-not-allowed" disabled="" id="continue-btn">
                Continue
            </button>
<div class="flex justify-center">
<button class="font-label text-label text-on-surface-variant hover:text-primary transition-colors py-sm px-md rounded-full">
                    Cancel and return to OTP
                </button>
</div>
</footer>
</main>
<!-- Visual Polish: Decorative Gradient Background (Subtle) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-40">
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-container blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary-container blur-[120px] rounded-full translate-y-1/2 -translate-x-1/2"></div>
</div>
<script>
        // Micro-interaction for the button state
        const nameInput = document.getElementById('full_name');
        const continueBtn = document.getElementById('continue-btn');

        nameInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 2) {
                continueBtn.disabled = false;
                continueBtn.classList.remove('opacity-40', 'grayscale');
            } else {
                continueBtn.disabled = true;
                continueBtn.classList.add('opacity-40', 'grayscale');
            }
        });

        // Simulating the camera upload interaction
        const profilePhotoContainer = document.querySelector('.relative.group');
        profilePhotoContainer.addEventListener('click', () => {
            console.log('Opening camera/gallery...');
            // In a real app, this would trigger a file picker or camera sheet
        });
    </script>
</body></html>
