<!-- UI Micro-interaction Layer -->
<script>
        // Simple pulsing color shift for the SOS pill to increase urgency
        const sosPill = document.querySelector('.bg-primary');
        let hue = 0;
        
        function subtlePulse() {
            // Animating opacity slightly to create a breathing effect
            const time = Date.now() * 0.002;
            const opacity = 0.85 + Math.sin(time) * 0.15;
            if (sosPill) sosPill.style.opacity = opacity;
            requestAnimationFrame(subtlePulse);
        }
        
        subtlePulse();

        // Drag handle simulation (visual only for this prototype)
        const panel = document.querySelector('.bg-white.rounded-t-\\[32px\\]');
        let isDragging = false;
        let startY = 0;

        panel.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            isDragging = true;
        });

        panel.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            if (deltaY > 0) { // Only allow dragging down
                panel.style.transform = `translateY(${deltaY}px)`;
            }
        });

        panel.addEventListener('touchend', () => {
            isDragging = false;
            panel.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            panel.style.transform = 'translateY(0)';
            setTimeout(() => {
                panel.style.transition = '';
            }, 300);
        });
    </script>
