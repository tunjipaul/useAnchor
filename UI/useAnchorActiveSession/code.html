<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }

        .animate-sos-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .safe-glow {
            box-shadow: 0 0 15px rgba(172, 45, 0, 0.1);
        }

            max-width: 390px;

            position: relative;

</div>

</header>
<main class="px-lg py-xl pb-32 space-y-xl">
<!-- Session Context Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg safe-glow">

<div>

</div>
<div class="text-right">

</div>
</div>
<div class="pt-md border-t border-outline-variant flex items-center justify-between">

<div class="flex -space-x-2">
<div class="w-8 h-8 rounded-full border-2 border-surface bg-cover bg-center" data-alt="Close-up portrait of a professional woman in her 30s with a warm, reassuring smile. She has dark hair and wears business casual attire against a blurred soft-focus office background. The lighting is warm and natural, suggesting a reliable and supportive emergency contact persona for a safety application." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAV_Jxxm3Wu-KZK6HAMyuxwjyimR_TJEaO3qE21I9KC3p-4rzr3YryDn1WUUTCoxA7fJTZ5-8LlJQvAuvviBzZlk2kGEpvz485KgmztwwSSeX-BAqHLVvVPeXX1a9e3PBiSBW0Qq75TIGx08BoTU8zYb4ORJ4LwdGk-0Z242E5HVFPh0LY6tqkGXes8SX3sVIDz-kIdyTDlX054yK6aE9KoQI6bCsjoPpkpHGmrefm7vjIcin05SJ41gbxCzb5CkclyhO_-rcmqDjo')"></div>

<div class="w-8 h-8 rounded-full border-2 border-surface bg-primary-container flex items-center justify-center font-bold text-white text-[10px]">+2</div>
</div>

</div>

<circle class="text-primary stroke-current progress-ring-circle" cx="50" cy="50" fill="transparent" r="44" stroke-linecap="round" stroke-width="6" style="stroke-dasharray: 276.46; stroke-dashoffset: 80;"></circle>

<div class="text-center">
<span class="block font-mono text-[48px] font-bold leading-none tracking-tighter text-on-surface">28:14</span>

<!-- Persistent Session Bar / SOS Anchor -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/95 backdrop-blur-md border-t border-outline-variant px-lg pt-xl pb-10 z-50 flex flex-col items-center">
<!-- SOS Pulsing Ring Container -->
<div class="relative mb-4">
<!-- Pulsing Rings -->
<div class="absolute inset-0 rounded-full bg-error/20 animate-sos-pulse scale-150"></div>
<div class="absolute inset-0 rounded-full bg-error/10 animate-sos-pulse delay-700 scale-[2]"></div>
<!-- Hold for SOS Button -->
<button class="relative w-[342px] h-4xl bg-error text-white rounded-full font-h1 flex items-center justify-center gap-md active:scale-95 transition-all shadow-lg overflow-hidden" id="sos-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>
                HOLD FOR SOS
                
                <!-- Interaction Fill Effect (Simulated) -->
<div class="absolute left-0 bottom-0 top-0 bg-white/20 w-0 transition-all duration-[3000ms] ease-linear" id="sos-fill"></div>
</button>
</div>
<p class="font-label text-label text-on-surface-variant opacity-70">Release to cancel SOS alert</p>
</footer>
<script>
        const sosBtn = document.getElementById('sos-btn');
        const sosFill = document.getElementById('sos-fill');
        let sosTimer;

        sosBtn.addEventListener('mousedown', startSos);
        sosBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSos(); });

        window.addEventListener('mouseup', cancelSos);
        window.addEventListener('touchend', cancelSos);

        function startSos() {
            sosFill.style.width = '100%';
            sosTimer = setTimeout(() => {
                alert('SOS ALERT TRIGGERED! Notifying emergency contacts and local authorities...');
                cancelSos();
            }, 3000);
        }

        function cancelSos() {
            clearTimeout(sosTimer);
            sosFill.style.width = '0%';
        }

        // Simple Countdown logic simulation
        let timeLeft = 28 * 60 + 14;
        const countdownEl = document.querySelector('.font-mono');
        const progressRing = document.querySelector('.progress-ring-circle');
        const totalTime = 30 * 60;

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                countdownEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                // Update Progress Ring
                const offset = 276.46 - (timeLeft / totalTime) * 276.46;
                progressRing.style.strokeDashoffset = offset;
            }
        }, 1000);
    </script>
