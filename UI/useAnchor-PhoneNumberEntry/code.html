<!-- Micro-interaction for input formatting -->
<script>
        const phoneInput = document.querySelector('input[type="tel"]');
        
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // Simple feedback for the primary button
        const sendBtn = document.querySelector('button.bg-primary-container');
        sendBtn.addEventListener('click', function() {
            const originalContent = this.innerHTML;
            this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            this.disabled = true;
            
            setTimeout(() => {
                this.innerHTML = originalContent;
                this.disabled = false;
                // Transition logic would go here
            }, 1200);
        });
    </script>
