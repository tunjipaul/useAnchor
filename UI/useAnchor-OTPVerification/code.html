<body class="flex flex-col min-h-screen text-on-surface antialiased">
<!-- Progress Header -->

<!-- Main Content Canvas -->
<main class="flex-grow px-lg pt-xl flex flex-col">
<!-- Typography Cluster -->
<section class="mb-3xl">
<h1 class="font-h1 text-h1 text-on-surface mb-sm">Enter your code</h1>
<p class="font-body text-body text-on-surface-variant">Sent to +234 XXX XXXX XXX</p>
</section>
<!-- OTP Input Area -->
<section class="mb-2xl">
<div class="flex justify-between items-center gap-2 max-w-[340px] mx-auto" id="otp-container">
<input autofocus="" class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-cell w-otp-w h-otp-h border border-brand-border bg-white rounded-lg text-center font-h1 text-h1 focus:ring-0 transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
</div>

</div>

                Change Phone Number
            </button>
</section>

<div class="flex-grow min-h-[32px]"></div>
<!-- Sticky Bottom Action (Fixed-to-Fluid Layout) -->

<button class="w-full h-[52px] bg-brand-burnt-orange text-white font-h2 rounded-lg shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" id="verify-btn">
<span>Verify</span>
</button>

<!-- Visual Polish: Tonal Background Detail -->
<div class="fixed top-0 right-0 -z-10 w-48 h-48 rounded-full bg-primary-container opacity-[0.03] blur-3xl translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-64 h-64 rounded-full bg-brand-burnt-orange opacity-[0.02] blur-3xl -translate-x-1/2 translate-y-1/2"></div>
<script>
        // Micro-interactions for OTP Inputs
        const inputs = document.querySelectorAll('#otp-container input');
        
        inputs.forEach((input, index) => {
            // Move to next input on type
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Handle backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Visual state on focus
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused-ring');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focused-ring');
            });
        });

        // Simple Countdown Timer Logic
        let timeLeft = 45;
        const timerSpan = document.querySelector('#timer-text span');
        
        const timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerSpan.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            } else {
                document.getElementById('timer-text').innerHTML = '<button class="text-brand-burnt-orange font-bold">Resend code now</button>';
                clearInterval(timerInterval);
            }
        }, 1000);

        // Verify Button Feedback
        document.getElementById('verify-btn').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span>`;
            btn.disabled = true;
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                // Simulation of success state
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span>`;
                btn.classList.replace('bg-brand-burnt-orange', 'bg-tertiary-container');
                btn.classList.add('text-on-tertiary-container');
            }, 1200);
        });
    </script>
